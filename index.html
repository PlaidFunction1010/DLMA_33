<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLMA_33 小試身手 - 修正版</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary-bg: #1a1a1a;
            --sidebar-bg: #2d2d2d;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-color: #3498db;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; background-color: var(--primary-bg); color: white; }
        #sidebar { width: 260px; height: 100vh; background: var(--sidebar-bg); position: fixed; padding: 20px; box-sizing: border-box; border-right: 2px solid #444; overflow-y: auto; }
        .chapter-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #3d3d3d; border: 1px solid #555; color: #eee; text-align: left; cursor: pointer; border-radius: 6px; }
        .chapter-btn:hover { background: var(--accent-color); }
        #main-content { margin-left: 260px; padding: 40px; width: 100%; max-width: 900px; color: var(--text-color); }
        .question-card { background: var(--card-bg); padding: 25px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .topic-tag { display: inline-block; background: #e1f5fe; color: #01579b; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; margin-bottom: 10px; }
        .question-text { font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; }
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; text-align: left; cursor: pointer; transition: 0.2s; font-size: 1rem; color: #333;}
        .option-btn:hover { background: #edf7ff; border-color: var(--accent-color); }
        .explanation { margin-top: 15px; padding: 15px; background: #f0fdf4; border-left: 4px solid #22c55e; display: none; border-radius: 4px; }
        .status-msg { font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:var(--accent-color)">DLMA_33</h2>
    <p style="font-size:0.9rem; color:#888;">選擇練習章節t：</p>
    <div id="chapter-list">
        <button class="chapter-btn" onclick="loadChapter('第一章')">第一章</button>
        <button class="chapter-btn" onclick="loadChapter('第二章')">第二章</button>
        <button class="chapter-btn" onclick="loadChapter('第三章')">第三章</button>
        <button class="chapter-btn" onclick="loadChapter('第四章')">第四章</button>
    </div>
</div>

<div id="main-content">
    <h1 id="current-chapter-title" style="color:white">請選擇章節</h1>
    <div id="questions-container"></div>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS7n1NCzcwQpMfJaxFaVJwtRQFeoABAGNgoyh_cC6LzrF8RVp-1OujZgMXO-uR1XZtL9VZIxFLQjnzs/pub?gid=0&single=true&output=csv";
    let allData = [];

    async function init() {
        try {
            const response = await fetch(csvUrl);
            const csvText = await response.text();
            allData = parseCSV(csvText);
            console.log("資料載入成功，共 " + allData.length + " 題");
        } catch (e) { console.error("載入失敗", e); }
    }

    function parseCSV(text) {
        const rows = text.split(/\r?\n/);
        const result = [];
        
        // 從索引 2 開始（跳過第1列標題與第2列英文說明）
        for (let i = 2; i < rows.length; i++) {
            if (!rows[i].trim()) continue;

            const matches = rows[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            if (!matches || matches.length < 4) continue;
            
            const cleanCols = matches.map(c => c.replace(/^"|"$/g, '').trim());

            result.push({
                chapter: cleanCols[0], 
                topic: cleanCols[1],   
                rawContent: cleanCols[2], 
                answer: cleanCols[3],  
                solution: cleanCols[4] || "" 
            });
        }
        return result;
    }

    function loadChapter(chapterName) {
        document.getElementById('current-chapter-title').innerText = chapterName;
        const container = document.getElementById('questions-container');
        container.innerHTML = "";

        const filtered = allData.filter(q => q.chapter === chapterName);

        if (filtered.length === 0) {
            container.innerHTML = `<p style="color:gray">目前「${chapterName}」沒有題目。</p>`;
            return;
        }

        filtered.forEach((q, idx) => {
            // 【核心修正】嚴謹選項切分邏輯
            
            // Regex: 尋找 (1), (2), (3), (4), (5)
            const optionRegex = /(\(\d\))/g;
            
            // 找出所有括號選項出現的位置
            let match;
            const positions = [];
            while ((match = optionRegex.exec(q.rawContent)) !== null) {
                positions.push(match.index);
            }

            let questionText = q.rawContent;
            const options = [];

            // 如果有找到选项
            if (positions.length > 0) {
                // 題目文字是第一个選項前的內容
                questionText = q.rawContent.substring(0, positions[0]);
                
                // 切分出選項內容
                for (let i = 0; i < positions.length; i++) {
                    const start = positions[i];
                    const end = (i + 1 < positions.length) ? positions[i+1] : q.rawContent.length;
                    const optionContent = q.rawContent.substring(start, end).trim();
                    if (optionContent) options.push(optionContent);
                }
            }

            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <span class="topic-tag">${q.topic}</span>
                <div class="question-text"><strong>Q${idx+1}.</strong> ${questionText}</div>
                <div class="options-grid">
                    ${options.map((opt, i) => `
                        <button class="option-btn" onclick="checkAnswer(this, '${i+1}', '${q.answer}', '${idx}')">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
                <div id="ans-${idx}" class="explanation">
                    <div class="status-msg"></div>
                    <div class="sol-text"><strong>解析：</strong>${q.solution}</div>
                </div>
            `;
            container.appendChild(card);
        });
        
        // 強制 MathJax 重新渲染，解決渲染失敗問題
        if (window.MathJax && window.MathJax.typeset) {
            window.MathJax.typeset();
        }
    }

    function checkAnswer(btn, selectedNum, correctAns, idx) {
        const expDiv = document.getElementById(`ans-${idx}`);
        const status = expDiv.querySelector('.status-msg');
        const cleanCorrect = correctAns.replace(/\(|\)/g, "").trim();
        
        expDiv.style.display = "block";
        if (selectedNum === cleanCorrect) {
            status.innerHTML = "✅ 正確！";
            status.style.color = "#27ae60";
        } else {
            status.innerHTML = `❌ 答錯了，正確答案是 (${cleanCorrect})`;
            status.style.color = "#e74c3c";
        }
    }

    init();
</script>

</body>
</html>
