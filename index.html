<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaid Math | 數學互動學習V1.1</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --sidebar-width: 300px; 
            --primary-gradient: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            --accent-color: #3498db; 
            --bg-color: #f0f2f5; 
            --card-shadow: 0 8px 30px rgba(0,0,0,0.05);
            --success-color: #27ae60;
            --wrong-color: #ff7675;
        }

        body { font-family: 'Noto Sans TC', sans-serif; margin: 0; display: flex; height: 100vh; background-color: var(--bg-color); user-select: none; }

        #sidebar { width: var(--sidebar-width); background: var(--primary-gradient); color: white; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.1); }
        #sidebar h2 { padding: 40px 20px; font-size: 1.4rem; border-bottom: 1px solid rgba(255,255,255,0.1); margin: 0; text-align: center; }

        .unit-list-container { flex-grow: 1; overflow-y: auto; padding: 20px 0; }
        .unit-item { padding: 18px 25px; cursor: pointer; transition: 0.2s; border-left: 5px solid transparent; color: #bdc3c7; }
        .unit-item.active { background: rgba(52, 152, 219, 0.15); border-left: 5px solid var(--accent-color); color: white; }

        #main-content { flex-grow: 1; padding: 50px; overflow-y: auto; scroll-behavior: smooth; }
        .card { background: white; padding: 35px; border-radius: 20px; box-shadow: var(--card-shadow); margin-bottom: 40px; position: relative; }

        /* 題型標籤與主題標籤 */
        .badge-group { margin-bottom: 20px; }
        .type-badge { background: #34495e; color: white; padding: 4px 10px; border-radius: 5px; font-size: 0.8rem; margin-right: 8px; }
        .theme-badge { background: #ebf5ff; color: #007bff; padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }
        
        .problem-img { width: 100%; max-height: 450px; object-fit: contain; border-radius: 12px; margin-bottom: 25px; border: 1px solid #f0f0f0; }
        .problem-text { font-size: 1.25rem; line-height: 1.9; color: #2d3436; margin-bottom: 30px; }
        
        /* 選項與輸入框 */
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .opt-card { padding: 18px; border: 2px solid #f1f3f5; border-radius: 12px; cursor: pointer; transition: 0.2s; background: #fff; }
        .opt-card:hover { border-color: var(--accent-color); }
        .opt-card.selected { border-color: var(--accent-color); background: #eef7ff; }
        .opt-card.correct { background: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .opt-card.wrong { background: var(--wrong-color) !important; color: white; border-color: #d63031; }

        .fill-input { width: 100%; padding: 15px; font-size: 1.1rem; border: 2px solid #eee; border-radius: 10px; margin-bottom: 20px; outline: none; transition: 0.3s; }
        .fill-input:focus { border-color: var(--accent-color); }

        .btn-submit { background: var(--accent-color); color: white; padding: 12px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 700; margin-bottom: 20px; }
        .btn-sol-toggle { background: #f8f9fa; color: #636e72; padding: 12px; border-radius: 10px; border: 1px solid #e9ecef; cursor: pointer; width: 100%; font-weight: 700; }
        .sol-content { margin-top: 20px; padding: 25px; background: #fffde7; border-radius: 12px; border-left: 6px solid #f1c40f; display: none; line-height: 1.8; }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav id="sidebar">
        <h2>Plaid Math</h2>
        <div class="unit-list-container" id="unit-list"></div>
    </nav>

    <main id="main-content">
        <div id="display-area">
            <div style="text-align:center; margin-top:150px; opacity:0.3;">
                <h1>MASTER MATHEMATICS</h1>
                <p>請選擇左側單元開始學習</p>
            </div>
        </div>
    </main>

    <script>
        const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS7n1NCzcwQpMfJaxFaVJwtRQFeoABAGNgoyh_cC6LzrF8RVp-1OujZgMXO-uR1XZtL9VZIxFLQjnzs/pub?output=csv'; 
        let allData = [];

        function init() {
            Papa.parse(sheetCsvUrl, {
                download: true, header: true,
                complete: function(results) {
                    allData = results.data.filter(r => r['Unit'] || r['單元名稱']);
                    renderSidebar();
                }
            });
        }

        function renderSidebar() {
            const container = document.getElementById('unit-list');
            const units = [...new Set(allData.map(d => d['單元名稱'] || d['Unit']))];
            container.innerHTML = units.map(u => `<div class="unit-item" onclick="loadUnit('${u}', this)">${u}</div>`).join('');
        }

        function loadUnit(unitName, el) {
            document.querySelectorAll('.unit-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            const area = document.getElementById('display-area');
            const problems = allData.filter(d => (d['單元名稱'] || d['Unit']) === unitName);
            area.innerHTML = `<h1 style="color:#2c3e50;">${unitName}</h1>`;
            
            problems.forEach((p, idx) => {
                const type = p['題型'] || '單選題';
                const raw = p['Text'] || p['題目內容，可輸入 LaTeX'] || '';
                const img = p['圖片網址'] || '';
                const correctAns = String(p['Answer'] || p['答案'] || '').trim();
                
                // 分離題目與選項
                const qBody = raw.split(/\(\d\)/)[0];
                const opts = raw.match(/\(\d\)[^(]*/g) || [];

                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${idx}`;

                let inputSection = '';
                if (type === '單選題' || type === '是非題') {
                    inputSection = `<div class="options-grid">
                        ${opts.map(o => {
                            const n = o.match(/\((\d)\)/)[1];
                            return `<div class="opt-card" onclick="checkSingle('${n}', '${correctAns}', this)">${o}</div>`;
                        }).join('')}
                    </div>`;
                } else if (type === '多選題') {
                    inputSection = `<div class="options-grid">
                        ${opts.map(o => {
                            const n = o.match(/\((\d)\)/)[1];
                            return `<div class="opt-card multi" data-val="${n}" onclick="this.classList.toggle('selected')">${o}</div>`;
                        }).join('')}
                    </div>
                    <button class="btn-submit" onclick="checkMulti('${correctAns}', ${idx})">核對多選答案</button>`;
                } else if (type === '填充題') {
                    inputSection = `
                        <input type="text" class="fill-input" id="fill-${idx}" placeholder="請在此輸入答案...">
                        <button class="btn-submit" onclick="checkFill('${correctAns}', ${idx})">核對填充答案</button>`;
                }

                card.innerHTML = `
                    <div class="badge-group">
                        <span class="type-badge">${type}</span>
                        <span class="theme-badge">${p['theme'] || p['主題'] || '核心例題'}</span>
                    </div>
                    ${img ? `<img src="${img}" class="problem-img">` : ''}
                    <div class="problem-text">${qBody}</div>
                    ${inputSection}
                    <button class="btn-sol-toggle" onclick="toggleSol('${idx}')">查看詳細解析</button>
                    <div id="sol-${idx}" class="sol-content"><strong>【專家解析】</strong><br><br>${p['Solution'] || p['詳細解答']}</div>
                `;
                area.appendChild(card);
            });

            renderMathInElement(area, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
        }

        // 判斷邏輯
        function checkSingle(chosen, correct, btn) {
            if (chosen === correct.replace(/[^0-9]/g, '')) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function checkMulti(correct, idx) {
            const card = document.getElementById(`card-${idx}`);
            const selected = Array.from(card.querySelectorAll('.opt-card.selected'));
            const userAns = selected.map(s => s.dataset.val).sort().join(',');
            const cleanCorrect = correct.split(',').sort().join(',');

            if (userAns === cleanCorrect) {
                selected.forEach(s => s.classList.add('correct'));
                alert("完全正確！");
            } else {
                alert("答案不正確，請再檢查一下");
            }
        }

        function checkFill(correct, idx) {
            const userAns = document.getElementById(`fill-${idx}`).value.trim();
            if (userAns === correct) {
                document.getElementById(`fill-${idx}`).style.backgroundColor = "#e8f5e9";
                alert("回答正確！");
            } else {
                alert("與標準答案不符，請再試試");
            }
        }

        function toggleSol(id) {
            const s = document.getElementById(`sol-${id}`);
            s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        }

        init();
    </script>
</body>
</html>
